name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker

      - name: Install MCP Dependencies
        run: npm install
        working-directory: ./mcp-ssh-deployer

      - name: Create secrets in Secret Manager
        run: |
          # Create secrets if they don't exist, otherwise update them
          echo "${{ secrets.MONGO_URI }}" | gcloud secrets create MONGO_URI --data-file=- 2>/dev/null || \
          echo "${{ secrets.MONGO_URI }}" | gcloud secrets versions add MONGO_URI --data-file=-
          
          echo "${{ secrets.JWT_SECRET }}" | gcloud secrets create JWT_SECRET --data-file=- 2>/dev/null || \
          echo "${{ secrets.JWT_SECRET }}" | gcloud secrets versions add JWT_SECRET --data-file=-
          
          echo "${{ secrets.SESSION_SECRET }}" | gcloud secrets create SESSION_SECRET --data-file=- 2>/dev/null || \
          echo "${{ secrets.SESSION_SECRET }}" | gcloud secrets versions add SESSION_SECRET --data-file=-

      - name: Deploy with MCP (Zero-Downtime)
        run: node src/index.js ../loopjs
        working-directory: ./mcp-ssh-deployer
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Verify Deployment Health
        run: |
          # Wait for services to be ready
          sleep 60
          
          # Get service URLs
          BACKEND_URL=$(gcloud run services describe loopjs-backend --region=$REGION --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe loopjs-frontend --region=$REGION --format='value(status.url)')
          
          echo "Backend URL: $BACKEND_URL"
          echo "Frontend URL: $FRONTEND_URL"
          
          # Perform comprehensive health checks
          echo "Testing backend health endpoint..."
          curl -f "$BACKEND_URL/health" --max-time 30 || exit 1
          
          echo "Testing frontend availability..."
          curl -f "$FRONTEND_URL" --max-time 30 || exit 1
          
          echo "All health checks passed! Deployment successful."

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          # Get previous revision and rollback if needed
          gcloud run services update-traffic loopjs-backend --region=$REGION --to-revisions=LATEST=100 || true
          gcloud run services update-traffic loopjs-frontend --region=$REGION --to-revisions=LATEST=100 || true