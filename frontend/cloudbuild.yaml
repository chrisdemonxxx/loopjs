steps:
  # Step 1: Discover backend URL dynamically
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        BACKEND_URL=$(gcloud run services describe loopjs-backend \
          --region=us-central1 \
          --format='value(status.url)')
        if [ -z "$BACKEND_URL" ]; then
          echo "Failed to resolve backend URL" >&2
          exit 1
        fi
        echo "BACKEND_URL=$BACKEND_URL" > backend_url.txt
        echo "Resolved backend URL: $BACKEND_URL"

  # Step 2: Build the container image with the resolved BACKEND_URL
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        . ./backend_url.txt
        docker build \
          -t gcr.io/$PROJECT_ID/loopjs-frontend:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/loopjs-frontend:latest \
          --build-arg VITE_BACKEND_URL="$BACKEND_URL" \
          .

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/loopjs-frontend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/loopjs-frontend:latest'

  # Step 3: Deploy to Cloud Run with zero-downtime deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'loopjs-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/loopjs-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--no-traffic'
      - '--tag'
      - 'candidate'

  # Step 4: Health check and traffic promotion
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Get the candidate revision URL
        CANDIDATE_URL=$$(gcloud run services describe loopjs-frontend \
          --region=us-central1 \
          --format="value(status.traffic[].url)" \
          --filter="status.traffic[].tag:candidate")
        
        # If no candidate URL found, get the latest revision URL
        if [ -z "$$CANDIDATE_URL" ]; then
          CANDIDATE_URL=$$(gcloud run services describe loopjs-frontend \
            --region=us-central1 \
            --format="value(status.url)")
        fi
        
        echo "Testing candidate revision at: $$CANDIDATE_URL"
        
        # Health check with retry
        for i in {1..5}; do
          if curl -f -s "$$CANDIDATE_URL" > /dev/null 2>&1; then
            echo "Health check passed, promoting to production"
            gcloud run services update-traffic loopjs-frontend \
              --region=us-central1 \
              --to-latest
            exit 0
          fi
          echo "Health check attempt $$i failed, retrying in 10 seconds..."
          sleep 10
        done
        
        echo "Health check failed, rolling back"
        gcloud run services update-traffic loopjs-frontend \
          --region=us-central1 \
          --to-revisions=LATEST=100
        exit 1

images:
  - 'gcr.io/$PROJECT_ID/loopjs-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/loopjs-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'